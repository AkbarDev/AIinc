<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Snapfacts">
  <defs>
    <!-- Vibrant Blue-Indigo Gradient for the Icon Background -->
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0991ff" />
      <stop offset="100%" stop-color="#0544b3" />
    </linearGradient>
    
    <!-- Modern Soft Shadow for a subtle 3D lift -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0544b3" flood-opacity="0.16" />
    </filter>
  </defs>

  <!-- Icon Base Shape -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#logo-gradient)" filter="url(#soft-shadow)"/>
  
  <!-- Icon Grid Pattern (Exact relative coordinates shifted) -->
  <circle cx="60" cy="60" r="18" fill="#ffffff" />
  <circle cx="60" cy="36" r="11" fill="#ffffff" opacity="0.72" />
  <circle cx="60" cy="84" r="9" fill="#ffffff" opacity="0.55" />
  <circle cx="38" cy="60" r="9" fill="#ffffff" opacity="0.58" />
  <circle cx="82" cy="60" r="9" fill="#ffffff" opacity="0.58" />
  <circle cx="38" cy="36" r="7" fill="#ffffff" opacity="0.38" />
  <circle cx="82" cy="36" r="7" fill="#ffffff" opacity="0.38" />
  <circle cx="38" cy="84" r="6" fill="#ffffff" opacity="0.28" />
  <circle cx="82" cy="84" r="5.5" fill="#ffffff" opacity="0.22" />

  <!-- Wordmark in 'Space Grotesk' -->
  <text x="130" y="68" font-family="'Space Grotesk', -apple-system, sans-serif" font-size="44" font-weight="700" fill="#0f1115" letter-spacing="-0.02em">Snapfacts</text>
  
  <!-- Tagline in 'Inter' -->
  <text x="132" y="94" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#5c6270" letter-spacing="0.16em">NEWS THAT MATTERS  •  STAY INSIGHTFUL</text>
</svg>
